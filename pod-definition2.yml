apiversion: v1
kind: pod
metadata:
  name: postgres-pod
  labels:
    type: db
    created: Riya 
spec:
  containers:
    - name: mydb
      image: postgres
      env:
        - name: POSTGRES_PASSWORD
          value: mydb@
        - name: POSTGRES_USER
          value: Riya
        - name: POSTGRES_DB
          value: mydb


